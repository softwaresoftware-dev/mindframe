name: test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  unit:
    name: unit (${{ matrix.os }} / py${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: install deps
        run: |
          python -m pip install --upgrade pip
          pip install pytest mcp
      - name: lib unit tests
        run: python -m pytest lib/tests/ -v
      - name: mcp unit tests
        run: python -m pytest mcp/tests/ -v

  wire:
    name: tier1 wire (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - name: checkout mindframe
        uses: actions/checkout@v4
        with:
          path: mindframe
      - name: checkout dispatcher (sibling — conftest looks for ../dispatcher)
        uses: actions/checkout@v4
        with:
          repository: softwaresoftware-dev/dispatcher
          path: dispatcher
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: install dispatcher + dashboard deps
        working-directory: mindframe
        run: |
          python -m pip install --upgrade pip
          pip install -r ../dispatcher/requirements.txt
          pip install -r dashboard/server/requirements.txt
          pip install pytest mcp pyyaml
      - name: tier 1 wire tests
        working-directory: mindframe
        run: python -m pytest tests/e2e_wire/ -v

  fresh-install:
    # Tier 3 — Windows skipped because taskpilot's tmux dep blocks the full
    # bundle there. The wire job above already proves mindframe's own code
    # is portable on Windows.
    name: tier3 fresh-install (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - name: checkout mindframe (this commit)
        uses: actions/checkout@v4
        with:
          path: mindframe
      - name: checkout dispatcher (main)
        uses: actions/checkout@v4
        with:
          repository: softwaresoftware-dev/dispatcher
          path: dispatcher
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: tier 3 native harness (uses local checkouts, no git clone)
        run: |
          python mindframe/tests/e2e_fresh/harness.py \
            --mindframe-path "${{ github.workspace }}/mindframe" \
            --dispatcher-path "${{ github.workspace }}/dispatcher" \
            --report "${{ github.workspace }}/tier3-report.json"
      - name: upload report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: tier3-report-${{ matrix.os }}
          path: ${{ github.workspace }}/tier3-report.json
          if-no-files-found: warn
