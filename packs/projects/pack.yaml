# Mindframe KB pack: personal project tracker
#
# Activate this pack when the vault is being used as a personal or small-team
# project board — one author, status-driven, project-shaped. Most enterprise
# customers will NOT activate this. They want the entity vault (services,
# people, runbooks); this pack is for the "what am I working on" use case.
#
# Reconciliation origin: replaces the apps/knowledge-base/ project-tracker
# pattern so personal-vault and customer-vault are the same architecture
# with different packs active, not parallel codebases.

name: projects
version: 0.1.0
description: |
  Personal / small-team project-tracker pack. Activates when the vault is used
  as a status-driven project board rather than an org KB. Extends the core
  project entity with status/priority/needs/code_path/open_threads.

activation:
  evidence:
    - probe: operator-declares
      value: personal-project-tracker
      notes: "The strongest signal — operator says they want to track in-flight work, not run an org KB."
    - probe: file-exists
      path: "Projects/"
      relative_to: vault
      notes: "An existing personal vault often already has a Projects/ directory at the root."
    - probe: operator-mentions
      values: [obsidian, project tracker, status board, personal vault, in-flight work]
      notes: "Free-text discovery answer in PHASE 4 mentions any of these."

# This pack introduces no new entity types — it extends the core `project`.
entities: {}

# Field extensions added to the core `project` entity when this pack activates.
extends_core:
  project:
    add_fields:
      - {name: status, type: string, required: true,
         enum: [idea, active, paused, shipped, archived],
         description: "Lifecycle state of this project."}
      - {name: priority, type: string,
         enum: [p1, p2, p3, p4],
         description: "Working priority. Optional; many vaults don't bother."}
      - {name: needs, type: string, list: true,
         description: "Tags for what the project still needs (e.g. marketing, deploy, docs, tests)."}
      - {name: code_path, type: string,
         description: "Relative or absolute path to the project's code directory, if any."}
      - {name: open_threads, type: string, list: true,
         description: "Unfinished sub-tasks worth coming back to. Each thread is a short imperative line."}

# Recommended companions — not required, but pair well.
companions:
  perception_mcps:
    - name: github-mcp
      reads: [project]
      notes: "If projects map to GitHub repos, the MCP can populate code_path and open_threads from issue lists."

  # Informational only — example deliverables operators commonly author against
  # this pack's entities. This pack ships no skills. The operator authors their
  # own utilities during /mindframe:setup PHASE 7 (guided authoring).
  example_deliverables:
    - name: project-status-report
      trigger: "Operator asks for a roll-up of active projects (manual invocation)."
      why: "Snapshot of what's in flight — status, priority, blockers, next moves — in one place."
    - name: thread-resurfacer
      trigger: "scheduled: weekly."
      why: "Surface open_threads on paused projects so they don't decay silently."

# Vault directory layout when this pack is active.
vault_layout:
  - path: "Projects/"
    purpose: "One markdown note per project. Frontmatter carries status/priority/needs/code_path/open_threads."
