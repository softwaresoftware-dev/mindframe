# Mindframe KB pack: software operations
#
# A pack is a named set of entity types for a domain. /mindframe:setup reads
# this file when the pack is activated and merges its entries into the
# deployment's schema.yaml manifest under source: pack:software-ops.
#
# STATUS: scaffold. Probe set and entity field shapes are starting hypotheses;
# the authoritative version comes from the software-co design partner's
# deployment.

name: software-ops
version: 0.1.0-scaffold
description: |
  Software engineering operations pack. Adds service, repository, runbook,
  deployment, and code-review entity types. Extends core team and incident.
  Activates on GitHub/cloud/observability signals. Scaffold-quality; final
  shape from the software-co design partner.

activation:
  evidence:
    - probe: binary-exists
      binaries: [gh, kubectl, docker, gcloud, aws, sentry-cli, pd, datadog-ci, terraform]
      implies: "developer machine with cloud-native tooling"
    - probe: mcp-registered
      mcps: [github, sentry, gcp-logging, grafana, datadog, pagerduty]
      implies: "Claude Code already wired to engineering systems"
    - probe: file-exists
      paths: ["~/.config/gh/hosts.yml", "~/.kube/config", "~/.aws/config", "~/.sentryclirc"]
      implies: "engineer-shaped config files present"
    - probe: code-root-marker
      markers:
        - .github/workflows
        - docker-compose.yml
        - Dockerfile
        - kubernetes/
        - helm/
        - terraform/
      implies: "in-scope codebases follow software-ops conventions"
    - probe: operator-mentions
      values: [github, gitlab, sentry, kubernetes, k8s, gcp, aws, datadog, pagerduty, grafana, terraform]
    - probe: operator-declares
      value: software-company

entities:

  service:
    layer: thing
    identity: name
    directory: Services
    description: "A runtime software component owned by a team."
    fields:
      - {name: description, type: string}
      - {name: language, type: string}
      - {name: runtime, type: string, description: "e.g. node, python, go, jvm, dotnet"}
      - {name: tier, type: string, enum: [t0, t1, t2, t3], description: "Operational tier (t0 = customer-facing critical)"}
      - {name: oncall_team, type: string}
    foreign_keys:
      repository: repository
      owners: team           # list FK
      runbook: runbook       # list FK
      owner: person          # accountable person (graph hub edge)

  repository:
    layer: thing
    identity: name
    directory: Repositories
    fields:
      - {name: host, type: string, enum: [github, gitlab, bitbucket, azure-devops, other]}
      - {name: visibility, type: string, enum: [public, private, internal]}
      - {name: default_branch, type: string, default: main}
      - {name: language, type: string}
    foreign_keys:
      service: service       # list FK — a repo may host multiple services
      owner: person          # accountable person (graph hub edge)

  runbook:
    layer: knowledge
    identity: slug
    directory: Runbooks
    description: "How to respond to a known incident class."
    fields:
      - {name: title, type: string, required: true}
      - {name: severity, type: string, enum: [sev0, sev1, sev2, sev3]}
      - {name: trigger, type: string, description: "What event/alert this runbook responds to."}
      - {name: steps, type: string, description: "Markdown body — the actual playbook."}
    foreign_keys:
      services: service      # list FK
      owner_team: team

  deployment:
    layer: event
    identity: slug
    directory: Deployments
    fields:
      - {name: started_at, type: timestamp, required: true}
      - {name: completed_at, type: timestamp}
      - {name: commit_sha, type: string}
      - {name: environment, type: string, enum: [production, staging, dev, preview]}
      - {name: succeeded, type: boolean}
    foreign_keys:
      service: service
      pr: code-review

  code-review:
    layer: event
    identity: slug
    directory: CodeReviews
    description: "A pull/merge request — open, reviewed, merged, or closed."
    fields:
      - {name: title, type: string, required: true}
      - {name: number, type: number}
      - {name: state, type: string, enum: [open, reviewed, merged, closed]}
      - {name: url, type: string}
      - {name: author, type: string}
    foreign_keys:
      repository: repository
      related_incident: incident

extends_core:
  team:
    add_fields:
      - {name: slack_channel, type: string}
      - {name: oncall_rotation, type: string, description: "PagerDuty schedule name or equivalent."}
  incident:
    add_fields:
      - {name: fix_pr, type: ref, target: code-review}
      - {name: sentry_project, type: string}
      - {name: affected_services, type: ref, target: service, list: true}

companions:
  perception_mcps:
    - name: github-mcp
      reads: [repository, code-review]
    - name: sentry-mcp
      reads: [incident]
    - name: gcp-logging-mcp
      reads: [incident, deployment]
    - name: pagerduty-mcp
      reads: [incident, runbook]
    - name: datadog-mcp
      reads: [incident]
    - name: grafana-mcp
      reads: [service]

  # Informational only — example deliverables operators commonly author against
  # this pack's entities. This pack ships no skills. The operator authors their
  # own utilities during /mindframe:setup PHASE 7 (guided authoring).
  example_deliverables:
    - name: sentry-triage
      trigger: "Sentry alert webhook."
      why: "Sentry → vault lookup (service, owners, prior incidents) → logs/traces → recent commits → draft Incident note + notify on-call. Classic mindframe loop."
    - name: pr-summary
      trigger: "GitHub PR-merged webhook."
      why: "Summarize the change, link affected services, post to the team channel. Cheap to author; high signal."
    - name: deploy-watch
      trigger: "Deployment webhook (Argo / Spinnaker / Helm)."
      why: "Tail the post-deploy error rate against the deploy's commit_sha; flag regressions; link the runbook for rollback."

# Vault directory layout when this pack is active.
vault_layout:
  - path: "Services/"
  - path: "Repositories/"
  - path: "Runbooks/"
  - path: "Deployments/"
  - path: "CodeReviews/"

notes: |
  Scaffold-quality. Probe values, entity fields, and skill specifications need
  validation against the software-co design partner's actual deployment. Treat
  each section as a hypothesis to confirm or correct during onboarding.

  Companion pack: pack-microsoft-stack — a Microsoft/Azure software shop will
  activate both. The two are not exclusive.
