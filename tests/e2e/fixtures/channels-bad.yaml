# Invalid channels.yaml — two distinct contract violations:
#   route 1: omits the required 'window' key (the static-spawn bug)
#   route 2: supplies 'bogus_key', which is not in the recipe schema
routes:
  - source: test-stream
    event_type: missing-window
    target: spawn:good-reader
    brief:
      output_path: /tmp/x.log

  - source: test-stream
    event_type: unknown-key
    target: spawn:good-reader
    brief:
      output_path: /tmp/x.log
      window: 24h
      bogus_key: nope
