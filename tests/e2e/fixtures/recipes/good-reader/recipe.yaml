# Fixture recipe for the recipe_contract checker. A well-formed recipe:
# every brief.json {{placeholder}} is declared in brief_schema.
task_id_pattern: "good-reader-{event_id}"
task_name: good-reader
kind: task
model: haiku

brief_schema:
  required:
    - output_path
    - window
  optional:
    - calendar_id

plugins:
  base:
    - google-calendar

starter_prompt: |
  Read task {task_id}. Operating brief:
  ```json
  {brief}
  ```
